# SPDX-License-Identifier: Apache-2.0
# Repo-local tool/env bootstrap. Run `mise install`, then use `just --list`.

[env]
# Keep repo Rust/test commands isolated from host GIS/native-library paths.
LD_LIBRARY_PATH = ""
QUACKGIS_HOST = "127.0.0.1"
QUACKGIS_PORT = "5434"
QUACKGIS_CATALOG_PATH = "{{config_root}}/.tmp/dev/quackgis.ducklake"
QUACKGIS_DATA_PATH = "{{config_root}}/.tmp/dev/data"
DUCKDB_VERSION = "1.5.4"
DUCKDB_HOME = "{{config_root}}/.tmp/duckdb/home"
QUACKGIS_DUCKDB_ADBC_DRIVER = "{{config_root}}/.tmp/duckdb/v1.5.4/lib/libduckdb.so"

[tools]
rust = "1.95.0"
"aqua:casey/just" = "1.53.0"
"aqua:duckdb/duckdb" = "1.5.4"
"cargo:cargo-nextest" = "latest"

[tasks.duckdb-bootstrap]
description = "Install checksum-pinned libduckdb and signed DuckDB extensions"
run = "python3 scripts/bootstrap_duckdb.py"

[settings]
experimental = true
