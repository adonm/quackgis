# SPDX-License-Identifier: Apache-2.0
# Repo-local tool/env bootstrap. Run `mise install`, then use `just --list`.

[env]
# Keep repo Rust/test commands isolated from host GIS/native-library paths.
LD_LIBRARY_PATH = ""
QUACKGIS_HOST = "127.0.0.1"
QUACKGIS_PORT = "5434"
QUACKGIS_CATALOG_PATH = "{{config_root}}/.tmp/dev/quackgis.db"
QUACKGIS_DATA_PATH = "{{config_root}}/.tmp/dev/data"
MARTIN_VERSION = "1.11.0"
MARTIN_BIN = "{{config_root}}/.tmp/bin/martin"
MARTIN_PORT = "3000"
QGIS_IMAGE = "docker.io/qgis/qgis:ltr-questing"
GEOSERVER_IMAGE = "docker.osgeo.org/geoserver:3.0.0"
POSTGIS_IMAGE = "docker.io/postgis/postgis:16-3.4"
OSM_EXTRACT_URL = "https://download.geofabrik.de/europe/monaco-latest.osm.pbf"
OSM_POINT_LIMIT = "50"
OSM_LINE_LIMIT = "50"
OSM_POLYGON_LIMIT = "50"
CONTAINER_ENGINE = "podman"
KIND_EXPERIMENTAL_PROVIDER = "podman"
KIND_CLUSTER = "quackgis"
QUACKGIS_IMAGE = "localhost/quackgis:dev"

[tools]
rust = "1.95.0"
"aqua:casey/just" = "1.53.0"
"aqua:kubernetes-sigs/kind" = "0.29.0"
"aqua:kubernetes/kubectl" = "1.33.2"
"aqua:helm/helm" = "3.18.3"
"cargo:cargo-nextest" = "latest"

[settings]
experimental = true
