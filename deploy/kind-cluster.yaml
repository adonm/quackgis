# SPDX-License-Identifier: Apache-2.0
#
# KinD cluster config with local registry and BuildKit support.
# Creates a cluster with a containerd registry mirror so images built
# in-cluster are immediately available without docker push/load.
#
# Usage:
#   kind create cluster --config deploy/kind-cluster.yaml
#   ./deploy/setup-buildkit.sh

apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster

# Containerd registry mirror: redirects localhost:5001 to the registry container.
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."localhost:5001"]
      endpoint = ["http://kind-registry:5000"]
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."quackgis-registry:5000"]
      endpoint = ["http://kind-registry:5000"]

nodes:
  - role: control-plane
    # Extra mounts for build cache persistence (optional, uses PVC instead)
    kubeadmConfigPatches:
      - |-
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            system-reserved: memory=2Gi
    extraPortMappings:
      # Map registry port to host
      - containerPort: 5001
        hostPort: 5001
        protocol: TCP
      # Map Postgres port for testing
      - containerPort: 5432
        hostPort: 5432
        protocol: TCP
  - role: worker
  - role: worker

# Connect the registry container to the cluster network.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kind-registry-config
  namespace: kube-system
data:
  registry: "kind-registry:5000"
