# SPDX-License-Identifier: Apache-2.0
apiVersion: batch/v1
kind: Job
metadata:
  name: qgis-edit-probe
  namespace: quackgis
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      volumes:
        - name: probe-scripts
          configMap:
            name: quackgis-probe-scripts
            defaultMode: 0755
      containers:
        - name: qgis
          image: docker.io/qgis/qgis:ltr-questing
          env:
            - name: QT_QPA_PLATFORM
              value: offscreen
            - name: XDG_RUNTIME_DIR
              value: /tmp/runtime-root
            - name: QUACKGIS_HOST
              value: quackgis.quackgis.svc.cluster.local
            - name: QUACKGIS_PORT
              value: "5434"
            - name: QGIS_DEBUG
              value: "1"
            - name: QGIS_LOG_FILE
              value: /tmp/qgis-edit.log
          volumeMounts:
            - name: probe-scripts
              mountPath: /opt/quackgis-probes
          command: ["bash", "-lc"]
          args:
            - |
              set -euo pipefail
              trap 'test -f /tmp/qgis-edit.log && { printf "%s\n" "--- qgis log ---"; cat /tmp/qgis-edit.log; } || true' EXIT
              mkdir -p "$XDG_RUNTIME_DIR"
              chmod 700 "$XDG_RUNTIME_DIR"
              PYTHONPATH=/opt/quackgis-probes python3 /opt/quackgis-probes/qgis_edit.py
