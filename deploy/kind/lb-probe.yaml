apiVersion: batch/v1
kind: Job
metadata:
  name: lb-probe
  namespace: quackgis
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      volumes:
        - name: probe-scripts
          configMap:
            name: quackgis-probe-scripts
            defaultMode: 0755
      containers:
        - name: lb-probe
          image: docker.io/qgis/qgis:ltr-questing
          env:
            - name: QUACKGIS_HOST
              value: lake.quackgis.svc.cluster.local
            - name: QUACKGIS_PORT
              value: "5434"
            - name: LB_CONNECTIONS
              value: "40"
            - name: LB_MIN_INSTANCES
              value: "2"
          volumeMounts:
            - name: probe-scripts
              mountPath: /opt/quackgis-probes
          command: ["bash", "-lc"]
          args:
            - |
              set -euo pipefail
              PYTHONPATH=/opt/quackgis-probes python3 /opt/quackgis-probes/lb_probe.py
