apiVersion: batch/v1
kind: Job
metadata:
  name: geoserver-probe
  namespace: quackgis
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      volumes:
        - name: geoserver-libs
          emptyDir: {}
        - name: probe-scripts
          configMap:
            name: quackgis-probe-scripts
            defaultMode: 0755
      initContainers:
        - name: pgjdbc
          image: docker.osgeo.org/geoserver:3.0.0
          command: ["bash", "-lc"]
          args:
            - |
              set -euo pipefail
              curl -fsSL https://jdbc.postgresql.org/download/postgresql-42.7.11.jar \
                -o /opt/additional_libs/postgresql-42.7.11.jar
          volumeMounts:
            - name: geoserver-libs
              mountPath: /opt/additional_libs
        - name: seed
          image: docker.io/qgis/qgis:ltr-questing
          env:
            - name: QUACKGIS_HOST
              value: quackgis.quackgis.svc.cluster.local
            - name: QUACKGIS_PORT
              value: "5434"
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
          command: ["bash", "-lc"]
          args:
            - |
              set -euo pipefail
              PYTHONPATH=/opt/quackgis-probes python3 /opt/quackgis-probes/geoserver_seed.py
          volumeMounts:
            - name: probe-scripts
              mountPath: /opt/quackgis-probes
      containers:
        - name: geoserver
          image: docker.osgeo.org/geoserver:3.0.0
          env:
            - name: QUACKGIS_HOST
              value: quackgis.quackgis.svc.cluster.local
            - name: QUACKGIS_PORT
              value: "5434"
            - name: GEOSERVER_ADMIN_USER
              value: admin
            - name: GEOSERVER_ADMIN_PASSWORD
              value: geoserver
            - name: SKIP_DEMO_DATA
              value: "true"
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
          volumeMounts:
            - name: geoserver-libs
              mountPath: /opt/additional_libs
            - name: probe-scripts
              mountPath: /opt/quackgis-probes
          command: ["bash", "-lc"]
          args:
            - |
              set -euo pipefail
              bash /opt/quackgis-probes/geoserver_probe.sh
