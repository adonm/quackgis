apiVersion: batch/v1
kind: Job
metadata:
  name: osm-postgis-parity
  namespace: quackgis
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: osm-parity
          image: docker.io/qgis/qgis:ltr-questing
          env:
            - name: QUACKGIS_HOST
              value: quackgis.quackgis.svc.cluster.local
            - name: QUACKGIS_PORT
              value: "5434"
            - name: POSTGIS_HOST
              value: postgis-osm.quackgis.svc.cluster.local
            - name: POSTGIS_PORT
              value: "5432"
            - name: OSM_EXTRACT_URL
              valueFrom:
                configMapKeyRef:
                  name: osm-parity-config
                  key: OSM_EXTRACT_URL
            - name: OSM_POINT_LIMIT
              valueFrom:
                configMapKeyRef:
                  name: osm-parity-config
                  key: OSM_POINT_LIMIT
            - name: OSM_LINE_LIMIT
              valueFrom:
                configMapKeyRef:
                  name: osm-parity-config
                  key: OSM_LINE_LIMIT
            - name: OSM_POLYGON_LIMIT
              valueFrom:
                configMapKeyRef:
                  name: osm-parity-config
                  key: OSM_POLYGON_LIMIT
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
          command: ["bash", "-lc"]
          args:
            - |
              set -euo pipefail
              run_ogr() {
                "$@" 2> >(grep -v -e 'unexpected field count in "D" message' -e '^ERROR 1: *$' >&2)
              }

              export OGR_INTERLEAVED_READING=YES
              export PG_USE_COPY=NO
              export QUACKGIS_POINTS_TABLE="osm_real_points_${POD_UID//-/_}"
              export QUACKGIS_LINES_TABLE="osm_real_lines_${POD_UID//-/_}"
              export QUACKGIS_MULTIPOLYGONS_TABLE="osm_real_multipolygons_${POD_UID//-/_}"
              postgis_dsn="PG:host=${POSTGIS_HOST} port=${POSTGIS_PORT} user=postgres dbname=osm"
              quackgis_dsn="PG:host=${QUACKGIS_HOST} port=${QUACKGIS_PORT} user=postgres dbname=quackgis"

              python3 - <<'PY'
              import os
              import time
              import urllib.request

              import psycopg2

              def wait_pg(label, host, port, dbname):
                  last = None
                  for _ in range(120):
                      try:
                          conn = psycopg2.connect(host=host, port=int(port), user="postgres", dbname=dbname)
                          conn.close()
                          return
                      except Exception as exc:  # pragma: no cover - probe diagnostics
                          last = exc
                          time.sleep(1)
                  raise RuntimeError(f"{label} not ready: {last}")

              wait_pg("postgis", os.environ["POSTGIS_HOST"], os.environ["POSTGIS_PORT"], "osm")
              wait_pg("quackgis", os.environ["QUACKGIS_HOST"], os.environ["QUACKGIS_PORT"], "quackgis")

              url = os.environ["OSM_EXTRACT_URL"]
              print("osm_extract_url", url)
              target = "/tmp/osm_extract.osm.pbf"
              for attempt in range(1, 4):
                  try:
                      urllib.request.urlretrieve(url, target)
                      break
                  except Exception:
                      if attempt == 3:
                          raise
                      time.sleep(2 * attempt)
              print("osm_extract_bytes", os.path.getsize(target))
              PY

              run_ogr ogrinfo /tmp/osm_extract.osm.pbf points -so
              run_ogr ogrinfo /tmp/osm_extract.osm.pbf lines -so
              run_ogr ogrinfo /tmp/osm_extract.osm.pbf multipolygons -so
              run_ogr ogr2ogr \
                -f PostgreSQL "${postgis_dsn}" /tmp/osm_extract.osm.pbf points \
                -overwrite -nln osm_raw_points -nlt POINT -lco GEOMETRY_NAME=geom
              run_ogr ogr2ogr \
                -f PostgreSQL "${postgis_dsn}" /tmp/osm_extract.osm.pbf lines \
                -overwrite -nln osm_raw_lines -nlt LINESTRING -lco GEOMETRY_NAME=geom
              run_ogr ogr2ogr \
                -f PostgreSQL "${postgis_dsn}" /tmp/osm_extract.osm.pbf multipolygons \
                -overwrite -nln osm_raw_multipolygons -nlt MULTIPOLYGON -lco GEOMETRY_NAME=geom

              python3 - <<'PY'
              import os

              import psycopg2

              layers = [
                  {
                      "label": "points",
                      "raw_table": "osm_raw_points",
                      "sample_table": "osm_named_points",
                      "quackgis_table": os.environ["QUACKGIS_POINTS_TABLE"],
                      "limit": int(os.environ.get("OSM_POINT_LIMIT", "50")),
                      "geom_expr": "geom::geometry(Point, 4326)",
                      "where": "geom IS NOT NULL AND name IS NOT NULL AND osm_id IS NOT NULL",
                  },
                  {
                      "label": "lines",
                      "raw_table": "osm_raw_lines",
                      "sample_table": "osm_named_lines",
                      "quackgis_table": os.environ["QUACKGIS_LINES_TABLE"],
                      "limit": int(os.environ.get("OSM_LINE_LIMIT", "50")),
                      "geom_expr": "geom::geometry(LineString, 4326)",
                      "where": "geom IS NOT NULL AND name IS NOT NULL AND osm_id IS NOT NULL",
                  },
                  {
                      "label": "multipolygons",
                      "raw_table": "osm_raw_multipolygons",
                      "sample_table": "osm_named_multipolygons",
                      "quackgis_table": os.environ["QUACKGIS_MULTIPOLYGONS_TABLE"],
                      "limit": int(os.environ.get("OSM_POLYGON_LIMIT", "50")),
                      "geom_expr": "ST_Multi(geom)::geometry(MultiPolygon, 4326)",
                      "where": "geom IS NOT NULL AND osm_id IS NOT NULL",
                  },
              ]

              postgis = psycopg2.connect(
                  host=os.environ["POSTGIS_HOST"],
                  port=int(os.environ["POSTGIS_PORT"]),
                  user="postgres",
                  dbname="osm",
              )
              postgis.autocommit = True
              cur = postgis.cursor()
              for layer in layers:
                  cur.execute(f"DROP TABLE IF EXISTS public.{layer['sample_table']}")
                  cur.execute(
                      f"""
                      CREATE TABLE public.{layer['sample_table']} AS
                      SELECT row_number() OVER (ORDER BY osm_id)::int AS id,
                             osm_id::text AS osm_id,
                             name::text AS name,
                             {layer['geom_expr']} AS geom
                      FROM public.{layer['raw_table']}
                      WHERE {layer['where']}
                      ORDER BY osm_id
                      LIMIT %s
                      """,
                      (layer["limit"],),
                  )
                  cur.execute(f"SELECT count(*) FROM public.{layer['sample_table']}")
                  count = cur.fetchone()[0]
                  print(f"postgis_osm_named_{layer['label']}_count", count)
                  if count <= 0:
                      raise RuntimeError(f"real OSM extract produced no {layer['label']} sample")
              cur.close()
              postgis.close()

              quackgis = psycopg2.connect(
                  host=os.environ["QUACKGIS_HOST"],
                  port=int(os.environ["QUACKGIS_PORT"]),
                  user="postgres",
                  dbname="quackgis",
              )
              quackgis.autocommit = True
              cur = quackgis.cursor()
              for layer in layers:
                  table = layer["quackgis_table"]
                  cur.execute(
                      f'CREATE TABLE public."{table}" '
                      "(id INT, wkb_geometry BINARY, name TEXT)"
                  )
                  print(f"quackgis_osm_{layer['label']}_table", table)
              cur.close()
              quackgis.close()
              PY

              run_ogr ogr2ogr \
                -f PostgreSQL "${quackgis_dsn}" "${postgis_dsn}" \
                -sql "SELECT id, osm_id, name, geom FROM public.osm_named_points ORDER BY id" \
                -append -addfields -nln "${QUACKGIS_POINTS_TABLE}" -nlt POINT -lco GEOMETRY_NAME=wkb_geometry
              run_ogr ogr2ogr \
                -f PostgreSQL "${quackgis_dsn}" "${postgis_dsn}" \
                -sql "SELECT id, osm_id, name, geom FROM public.osm_named_lines ORDER BY id" \
                -append -addfields -nln "${QUACKGIS_LINES_TABLE}" -nlt LINESTRING -lco GEOMETRY_NAME=wkb_geometry
              run_ogr ogr2ogr \
                -f PostgreSQL "${quackgis_dsn}" "${postgis_dsn}" \
                -sql "SELECT id, osm_id, name, geom FROM public.osm_named_multipolygons ORDER BY id" \
                -append -addfields -nln "${QUACKGIS_MULTIPOLYGONS_TABLE}" -nlt MULTIPOLYGON -lco GEOMETRY_NAME=wkb_geometry

              run_ogr ogrinfo "${quackgis_dsn}" "${QUACKGIS_POINTS_TABLE}" -so
              run_ogr ogrinfo "${quackgis_dsn}" "${QUACKGIS_LINES_TABLE}" -so
              run_ogr ogrinfo "${quackgis_dsn}" "${QUACKGIS_MULTIPOLYGONS_TABLE}" -so
              run_ogr ogr2ogr -f GeoJSON /tmp/postgis_points.geojson "${postgis_dsn}" osm_named_points
              run_ogr ogr2ogr -f GeoJSON /tmp/quackgis_points.geojson "${quackgis_dsn}" "${QUACKGIS_POINTS_TABLE}"
              run_ogr ogr2ogr -f GeoJSON /tmp/postgis_lines.geojson "${postgis_dsn}" osm_named_lines
              run_ogr ogr2ogr -f GeoJSON /tmp/quackgis_lines.geojson "${quackgis_dsn}" "${QUACKGIS_LINES_TABLE}"
              run_ogr ogr2ogr -f GeoJSON /tmp/postgis_multipolygons.geojson "${postgis_dsn}" osm_named_multipolygons
              run_ogr ogr2ogr -f GeoJSON /tmp/quackgis_multipolygons.geojson "${quackgis_dsn}" "${QUACKGIS_MULTIPOLYGONS_TABLE}"

              python3 - <<'PY'
              from collections import Counter
              import json
              import os

              import psycopg2

              layers = [
                  {
                      "label": "points",
                      "sample_table": "osm_named_points",
                      "quackgis_table": os.environ["QUACKGIS_POINTS_TABLE"],
                      "postgis_geojson": "/tmp/postgis_points.geojson",
                      "quackgis_geojson": "/tmp/quackgis_points.geojson",
                      "expected_types": {"Point"},
                  },
                  {
                      "label": "lines",
                      "sample_table": "osm_named_lines",
                      "quackgis_table": os.environ["QUACKGIS_LINES_TABLE"],
                      "postgis_geojson": "/tmp/postgis_lines.geojson",
                      "quackgis_geojson": "/tmp/quackgis_lines.geojson",
                      "expected_types": {"LineString", "MultiLineString"},
                  },
                  {
                      "label": "multipolygons",
                      "sample_table": "osm_named_multipolygons",
                      "quackgis_table": os.environ["QUACKGIS_MULTIPOLYGONS_TABLE"],
                      "postgis_geojson": "/tmp/postgis_multipolygons.geojson",
                      "quackgis_geojson": "/tmp/quackgis_multipolygons.geojson",
                      "expected_types": {"Polygon", "MultiPolygon"},
                  },
              ]

              def load(path):
                  with open(path, "r", encoding="utf-8") as f:
                      return json.load(f)["features"]

              def feature_key(feature):
                  props = feature["properties"]
                  return (str(props.get("id")), str(props.get("osm_id")), props.get("name"))

              def coordinate_pairs(coords):
                  if not isinstance(coords, list) or not coords:
                      return
                  first = coords[0]
                  if isinstance(first, (int, float)):
                      yield coords[:2]
                      return
                  for child in coords:
                      yield from coordinate_pairs(child)

              def bbox(features, expected_types):
                  xs = []
                  ys = []
                  for feature in features:
                      geom = feature["geometry"]
                      if geom["type"] not in expected_types:
                          raise AssertionError(f"expected {expected_types}, got {geom['type']}")
                      for x, y in coordinate_pairs(geom["coordinates"]):
                          xs.append(round(float(x), 9))
                          ys.append(round(float(y), 9))
                  return (min(xs), min(ys), max(xs), max(ys))

              def sql_rows(host, port, dbname, table):
                  conn = psycopg2.connect(host=host, port=int(port), user="postgres", dbname=dbname)
                  cur = conn.cursor()
                  cur.execute(f'SELECT id, osm_id, name FROM public."{table}" ORDER BY id')
                  rows = [(row[0], str(row[1]), row[2]) for row in cur.fetchall()]
                  cur.close()
                  conn.close()
                  return rows

              for layer in layers:
                  label = layer["label"]
                  postgis_features = load(layer["postgis_geojson"])
                  quackgis_features = load(layer["quackgis_geojson"])
                  postgis_keys = sorted(feature_key(feature) for feature in postgis_features)
                  quackgis_keys = sorted(feature_key(feature) for feature in quackgis_features)
                  postgis_bbox = bbox(postgis_features, layer["expected_types"])
                  quackgis_bbox = bbox(quackgis_features, layer["expected_types"])
                  postgis_types = Counter(feature["geometry"]["type"] for feature in postgis_features)
                  quackgis_types = Counter(feature["geometry"]["type"] for feature in quackgis_features)

                  print(f"postgis_osm_{label}_geojson_count", len(postgis_features))
                  print(f"quackgis_osm_{label}_geojson_count", len(quackgis_features))
                  print(f"osm_{label}_geojson_sample_keys", quackgis_keys[:5])
                  print(f"postgis_osm_{label}_geometry_types", dict(postgis_types))
                  print(f"quackgis_osm_{label}_geometry_types", dict(quackgis_types))
                  print(f"postgis_osm_{label}_bbox", postgis_bbox)
                  print(f"quackgis_osm_{label}_bbox", quackgis_bbox)

                  assert len(postgis_features) == len(quackgis_features), (label, len(postgis_features), len(quackgis_features))
                  assert postgis_keys == quackgis_keys, (label, postgis_keys[:5], quackgis_keys[:5])
                  assert postgis_types == quackgis_types, (label, postgis_types, quackgis_types)
                  assert postgis_bbox == quackgis_bbox, (label, postgis_bbox, quackgis_bbox)

                  quackgis_rows = sql_rows(
                      os.environ["QUACKGIS_HOST"],
                      os.environ["QUACKGIS_PORT"],
                      "quackgis",
                      layer["quackgis_table"],
                  )
                  postgis_rows = sql_rows(
                      os.environ["POSTGIS_HOST"],
                      os.environ["POSTGIS_PORT"],
                      "osm",
                      layer["sample_table"],
                  )
                  print(f"quackgis_osm_named_{label}_count", len(quackgis_rows))
                  print(f"postgis_osm_{label}_sql_sample", postgis_rows[:5])
                  print(f"quackgis_osm_{label}_sql_sample", quackgis_rows[:5])
                  assert quackgis_rows == postgis_rows, (label, postgis_rows[:5], quackgis_rows[:5])

              print("osm_postgis_to_quackgis_copy_ok True")
              PY
