# SPDX-License-Identifier: Apache-2.0
apiVersion: v1
kind: Namespace
metadata:
  name: quackgis
---
apiVersion: v1
kind: Service
metadata:
  name: quackgis
  namespace: quackgis
spec:
  type: ClusterIP
  selector:
    app: quackgis
  ports:
    - name: pgwire
      port: 5434
      targetPort: pgwire
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: quackgis
  namespace: quackgis
spec:
  serviceName: quackgis
  replicas: 1
  selector:
    matchLabels:
      app: quackgis
  template:
    metadata:
      labels:
        app: quackgis
    spec:
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: quackgis
          image: localhost/quackgis:dev
          imagePullPolicy: IfNotPresent
          args:
            - --host
            - 0.0.0.0
            - --port
            - "5434"
            - --catalog-path
            - /var/lib/quackgis/quackgis.db
            - --data-path
            - /var/lib/quackgis/data
          ports:
            - name: pgwire
              containerPort: 5434
          env:
            - name: QUACKGIS_LOG
              value: info
          readinessProbe:
            tcpSocket:
              port: pgwire
            initialDelaySeconds: 3
            periodSeconds: 2
            timeoutSeconds: 1
          livenessProbe:
            tcpSocket:
              port: pgwire
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: ducklake
              mountPath: /var/lib/quackgis
  volumeClaimTemplates:
    - metadata:
        name: ducklake
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
