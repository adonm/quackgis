# SPDX-License-Identifier: Apache-2.0
apiVersion: v1
kind: Service
metadata:
  name: external-lake
  namespace: quackgis
spec:
  type: ClusterIP
  selector:
    app: external-lake
  ports:
    - name: pgwire
      port: 5434
      targetPort: pgwire
    - name: metrics
      port: 9187
      targetPort: metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-lake
  namespace: quackgis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-lake
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/opaque-ports: "5434"
      labels:
        app: external-lake
    spec:
      containers:
        - name: quackgis
          image: localhost/quackgis:dev
          imagePullPolicy: IfNotPresent
          args:
            - --host
            - 0.0.0.0
            - --port
            - "5434"
          ports:
            - name: pgwire
              containerPort: 5434
            - name: metrics
              containerPort: 9187
          env:
            - name: QUACKGIS_LOG
              value: info
            - name: QUACKGIS_METRICS_HOST
              value: 0.0.0.0
            - name: QUACKGIS_METRICS_PORT
              value: "9187"
            - name: QUACKGIS_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: QUACKGIS_CATALOG_URL
              valueFrom:
                secretKeyRef:
                  name: external-storage
                  key: catalog-url
            - name: QUACKGIS_DUCKLAKE_CATALOG_NAME
              valueFrom:
                secretKeyRef:
                  name: external-storage
                  key: ducklake-catalog-name
            - name: QUACKGIS_DATA_PATH
              valueFrom:
                secretKeyRef:
                  name: external-storage
                  key: data-path
            - name: QUACKGIS_S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: external-storage
                  key: s3-endpoint
            - name: QUACKGIS_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: external-storage
                  key: s3-access-key-id
            - name: QUACKGIS_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: external-storage
                  key: s3-secret-access-key
            - name: QUACKGIS_S3_REGION
              valueFrom:
                secretKeyRef:
                  name: external-storage
                  key: s3-region
            - name: QUACKGIS_S3_ALLOW_HTTP
              valueFrom:
                secretKeyRef:
                  name: external-storage
                  key: s3-allow-http
          readinessProbe:
            tcpSocket:
              port: pgwire
            initialDelaySeconds: 3
            periodSeconds: 2
            timeoutSeconds: 1
          livenessProbe:
            tcpSocket:
              port: pgwire
            initialDelaySeconds: 10
            periodSeconds: 10
