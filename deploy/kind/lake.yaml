# SPDX-License-Identifier: Apache-2.0
apiVersion: v1
kind: Namespace
metadata:
  name: quackgis
---
apiVersion: v1
kind: Secret
metadata:
  name: storage
  namespace: quackgis
type: Opaque
stringData:
  # Local Kind-only defaults. Override this Secret for non-dev clusters.
  postgres-user: postgres
  postgres-password: postgres
  postgres-db: quackgis
  s3-access-key-id: quackgis
  s3-secret-access-key: quackgis
---
apiVersion: v1
kind: Service
metadata:
  name: pg
  namespace: quackgis
spec:
  type: ClusterIP
  selector:
    app: pg
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pg
  namespace: quackgis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pg
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/opaque-ports: "5432"
      labels:
        app: pg
    spec:
      containers:
        - name: postgres
          image: docker.io/postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: storage
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: storage
                  key: postgres-password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: storage
                  key: postgres-db
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 3
            periodSeconds: 2
            timeoutSeconds: 2
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: s3
  namespace: quackgis
spec:
  type: ClusterIP
  selector:
    app: s3
  ports:
    - name: s3
      port: 8014
      targetPort: s3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: s3
  namespace: quackgis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: s3
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
      labels:
        app: s3
    spec:
      containers:
        - name: s3s-fs
          image: ghcr.io/s3s-project/s3s:0.14.1
          imagePullPolicy: IfNotPresent
          command: ["./s3s-fs"]
          args:
            - --host
            - 0.0.0.0
            - --port
            - "8014"
            - --access-key
            - $(QUACKGIS_S3_ACCESS_KEY_ID)
            - --secret-key
            - $(QUACKGIS_S3_SECRET_ACCESS_KEY)
            - /data
          env:
            - name: QUACKGIS_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: storage
                  key: s3-access-key-id
            - name: QUACKGIS_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: storage
                  key: s3-secret-access-key
          ports:
            - name: s3
              containerPort: 8014
          readinessProbe:
            tcpSocket:
              port: s3
            initialDelaySeconds: 2
            periodSeconds: 2
            timeoutSeconds: 1
          volumeMounts:
            - name: s3-data
              mountPath: /data
      volumes:
        - name: s3-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: lake
  namespace: quackgis
spec:
  type: ClusterIP
  selector:
    app: lake
  ports:
    - name: pgwire
      port: 5434
      targetPort: pgwire
    - name: metrics
      port: 9187
      targetPort: metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lake
  namespace: quackgis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lake
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/opaque-ports: "5434"
      labels:
        app: lake
    spec:
      containers:
        - name: quackgis
          image: localhost/quackgis:dev
          imagePullPolicy: IfNotPresent
          args:
            - --host
            - 0.0.0.0
            - --port
            - "5434"
          ports:
            - name: pgwire
              containerPort: 5434
            - name: metrics
              containerPort: 9187
          env:
            - name: QUACKGIS_LOG
              value: info
            - name: QUACKGIS_METRICS_HOST
              value: 0.0.0.0
            - name: QUACKGIS_METRICS_PORT
              value: "9187"
            - name: QUACKGIS_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: QUACKGIS_POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: storage
                  key: postgres-user
            - name: QUACKGIS_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: storage
                  key: postgres-password
            - name: QUACKGIS_POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: storage
                  key: postgres-db
            - name: QUACKGIS_CATALOG_URL
              value: postgres://$(QUACKGIS_POSTGRES_USER):$(QUACKGIS_POSTGRES_PASSWORD)@pg.quackgis.svc.cluster.local:5432/$(QUACKGIS_POSTGRES_DB)
            - name: QUACKGIS_DUCKLAKE_CATALOG_NAME
              value: quackgis
            - name: QUACKGIS_DATA_PATH
              value: s3://quackgis/ducklake
            - name: QUACKGIS_S3_ENDPOINT
              value: http://s3.quackgis.svc.cluster.local:8014
            - name: QUACKGIS_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: storage
                  key: s3-access-key-id
            - name: QUACKGIS_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: storage
                  key: s3-secret-access-key
            - name: QUACKGIS_S3_REGION
              value: us-east-1
            - name: QUACKGIS_S3_ALLOW_HTTP
              value: "true"
          readinessProbe:
            tcpSocket:
              port: pgwire
            initialDelaySeconds: 3
            periodSeconds: 2
            timeoutSeconds: 1
          livenessProbe:
            tcpSocket:
              port: pgwire
            initialDelaySeconds: 10
            periodSeconds: 10
