# SPDX-License-Identifier: Apache-2.0
apiVersion: v1
kind: Namespace
metadata:
  name: quackgis
---
apiVersion: v1
kind: Service
metadata:
  name: postgis-osm
  namespace: quackgis
spec:
  type: ClusterIP
  selector:
    app: postgis-osm
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgis-osm
  namespace: quackgis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgis-osm
  template:
    metadata:
      labels:
        app: postgis-osm
    spec:
      containers:
        - name: postgis
          image: docker.io/postgis/postgis:16-3.4
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: osm
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_HOST_AUTH_METHOD
              value: trust
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "osm"]
            initialDelaySeconds: 5
            periodSeconds: 3
            timeoutSeconds: 2
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "osm"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: pgdata
          emptyDir: {}
