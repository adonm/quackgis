apiVersion: batch/v1
kind: Job
metadata:
  name: olap-probe
  namespace: quackgis
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      volumes:
        - name: probe-scripts
          configMap:
            name: quackgis-probe-scripts
            defaultMode: 0755
      containers:
        - name: olap-probe
          image: docker.io/qgis/qgis:ltr-questing
          env:
            - name: QUACKGIS_HOST
              value: lake.quackgis.svc.cluster.local
            - name: QUACKGIS_PORT
              value: "5434"
            - name: OLAP_FACTOR
              value: "30"
            - name: OLAP_WORKERS
              value: "4"
            - name: OLAP_QUERIES
              value: "24"
            - name: OLAP_MODE
              value: probe
            - name: OLAP_TABLE
              value: olap_assets
          volumeMounts:
            - name: probe-scripts
              mountPath: /opt/quackgis-probes
          command: ["bash", "-lc"]
          args:
            - |
              set -euo pipefail
              PYTHONPATH=/opt/quackgis-probes python3 /opt/quackgis-probes/olap_probe.py
