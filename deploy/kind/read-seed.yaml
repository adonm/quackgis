apiVersion: batch/v1
kind: Job
metadata:
  name: read-seed
  namespace: quackgis
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      volumes:
        - name: probe-scripts
          configMap:
            name: quackgis-probe-scripts
            defaultMode: 0755
      containers:
        - name: read-seed
          image: docker.io/qgis/qgis:ltr-questing
          env:
            - name: QUACKGIS_HOST
              value: lake.quackgis.svc.cluster.local
            - name: QUACKGIS_PORT
              value: "5434"
            - name: READ_FACTOR
              value: "25"
            - name: READ_WORKERS
              value: "8"
            - name: READ_QUERIES
              value: "80"
            - name: READ_MODE
              value: seed
            - name: READ_TABLE
              value: read_aerial
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
          volumeMounts:
            - name: probe-scripts
              mountPath: /opt/quackgis-probes
          command: ["bash", "-lc"]
          args:
            - |
              set -euo pipefail
              PYTHONPATH=/opt/quackgis-probes python3 /opt/quackgis-probes/read_probe.py
