# SPDX-License-Identifier: Apache-2.0
apiVersion: v1
kind: Namespace
metadata:
  name: quackgis
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: quackgis
  namespace: quackgis
---
apiVersion: v1
kind: Service
metadata:
  name: quackgis
  namespace: quackgis
  labels:
    app: quackgis
spec:
  type: ClusterIP
  selector:
    app: quackgis
  ports:
    - name: pgwire
      port: 5434
      targetPort: pgwire
    - name: metrics
      port: 9187
      targetPort: metrics
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: quackgis
  namespace: quackgis
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: quackgis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quackgis
  namespace: quackgis
  labels:
    app: quackgis
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quackgis
  template:
    metadata:
      labels:
        app: quackgis
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: quackgis
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: quackgis
          image: ghcr.io/adonm/quackgis:latest
          imagePullPolicy: IfNotPresent
          args:
            - --host
            - 0.0.0.0
            - --port
            - "5434"
          ports:
            - name: pgwire
              containerPort: 5434
            - name: metrics
              containerPort: 9187
          env:
            - name: QUACKGIS_LOG
              value: info
            - name: QUACKGIS_AUTH_MODE
              value: password
            - name: QUACKGIS_TLS_CERT
              value: /var/run/quackgis/tls/tls.crt
            - name: QUACKGIS_TLS_KEY
              value: /var/run/quackgis/tls/tls.key
            - name: QUACKGIS_METRICS_HOST
              value: 0.0.0.0
            - name: QUACKGIS_METRICS_PORT
              value: "9187"
            - name: QUACKGIS_S3_ALLOW_HTTP
              value: "false"
            - name: QUACKGIS_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: QUACKGIS_CATALOG_URL
              valueFrom:
                secretKeyRef:
                  name: quackgis-storage
                  key: catalog-url
            - name: QUACKGIS_DUCKLAKE_CATALOG_NAME
              valueFrom:
                secretKeyRef:
                  name: quackgis-storage
                  key: ducklake-catalog-name
            - name: QUACKGIS_DATA_PATH
              valueFrom:
                secretKeyRef:
                  name: quackgis-storage
                  key: data-path
            - name: QUACKGIS_S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: quackgis-storage
                  key: s3-endpoint
            - name: QUACKGIS_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: quackgis-storage
                  key: s3-access-key-id
            - name: QUACKGIS_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: quackgis-storage
                  key: s3-secret-access-key
            - name: QUACKGIS_S3_REGION
              valueFrom:
                secretKeyRef:
                  name: quackgis-storage
                  key: s3-region
            - name: QUACKGIS_READWRITE_USER
              valueFrom:
                secretKeyRef:
                  name: quackgis-auth
                  key: readwrite-user
            - name: QUACKGIS_READWRITE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: quackgis-auth
                  key: readwrite-password
            - name: QUACKGIS_READONLY_USER
              valueFrom:
                secretKeyRef:
                  name: quackgis-auth
                  key: readonly-user
            - name: QUACKGIS_READONLY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: quackgis-auth
                  key: readonly-password
          readinessProbe:
            tcpSocket:
              port: pgwire
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            tcpSocket:
              port: pgwire
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tls
              mountPath: /var/run/quackgis/tls
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tls
          secret:
            secretName: quackgis-tls
        - name: tmp
          emptyDir: {}
