{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "quackgis.fullname" . }}
  labels:
    {{- include "quackgis.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "quackgis.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from pods matching the configured labels (empty = allow all).
    {{- if .Values.networkPolicy.ingressFromLabels }}
    - from:
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressFromLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
    {{- else }}
    - {}
    {{- end }}
  egress:
    # DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
    {{- if .Values.quackgis.ducklake.s3.enabled }}
    # HTTPS for S3/object store
    - to: []
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
    # Local loopback (Postgres + DuckDB IPC)
    - to:
        - ipBlock:
            cidr: 127.0.0.1/32
{{- end }}
