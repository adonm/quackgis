apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "quackgis.fullname" . }}
  labels:
    {{- include "quackgis.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "quackgis.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "quackgis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "quackgis.selectorLabels" . | nindent 8 }}
    spec:
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: quackgis
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.quackgis.postgresUser | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "quackgis.fullname" . }}-secret
                  key: postgres-password
            - name: POSTGRES_DB
              value: {{ .Values.quackgis.postgresDb | quote }}
            - name: QUACKGIS_DUCKDB_MEMORY_LIMIT
              value: {{ .Values.quackgis.duckdbMemoryLimit | quote }}
            - name: QUACKGIS_DUCKDB_THREADS
              value: {{ .Values.quackgis.duckdbThreads | quote }}
            - name: QUACKGIS_REWRITE_MODE
              value: {{ .Values.quackgis.rewriteMode | quote }}
            - name: QUACKGIS_DUCKLAKE_DIR
              value: /var/lib/quackgis
            {{- if .Values.quackgis.ducklake.dataPath }}
            - name: QUACKGIS_DUCKLAKE_DATA_PATH
              value: {{ .Values.quackgis.ducklake.dataPath | quote }}
            {{- end }}
            {{- if .Values.quackgis.ducklake.s3.enabled }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.quackgis.ducklake.s3.existingSecret | default (printf "%s-s3" (include "quackgis.fullname" .)) }}
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.quackgis.ducklake.s3.existingSecret | default (printf "%s-s3" (include "quackgis.fullname" .)) }}
                  key: AWS_SECRET_ACCESS_KEY
            {{- if .Values.quackgis.ducklake.s3.region }}
            - name: AWS_DEFAULT_REGION
              value: {{ .Values.quackgis.ducklake.s3.region | quote }}
            {{- end }}
            {{- end }}
          ports:
            - name: pgql
              containerPort: 5432
              protocol: TCP
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: ducklake
              mountPath: /var/lib/quackgis
      volumes:
        - name: pgdata
          {{- if .Values.persistence.pgdata.enabled }}
          persistentVolumeClaim:
            claimName: pgdata
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: ducklake
          {{- if .Values.persistence.ducklake.enabled }}
          persistentVolumeClaim:
            claimName: ducklake
          {{- else }}
          emptyDir: {}
          {{- end }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
