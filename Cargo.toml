# SPDX-License-Identifier: Apache-2.0
#
# QuackGIS workspace. See ARCHITECTURE.md for the layer model and
# ROADMAP.md for the gap ledger (G1-G12) driving fork decisions.
#
# The spike at spike/m00-wire-spike is intentionally NOT a workspace member:
# it's a standalone throwaway crate used to validate the wire assumption
# without dragging in the rest of the workspace. The real server lives in
# crates/quackgis-server.

[workspace]
resolver = "2"
members = ["crates/quackgis-server"]

[workspace.package]
version = "0.2.0"
edition = "2021"
rust-version = "1.88"
license = "Apache-2.0"
authors = ["QuackGIS contributors"]
repository = "https://github.com/adonm/quackgis"
homepage = "https://github.com/adonm/quackgis"
description = "PostGIS-compatible spatial database server on datafusion-postgres + SedonaDB + DuckLake"
readme = "README.md"
keywords = ["gis", "geospatial", "postgis", "datafusion", "sedona"]
categories = ["database", "science::geo"]
publish = false

[workspace.dependencies]
# Wire layer — adonm fork on the quackgis/fixes branch, currently carrying:
#   - context.rs PgCatalogContextProvider-for-Arc<T> recursion fix (G2 pg_roles
#     stack overflow, commit 2c43dc6). Upstream PR candidate.
# Tracks upstream master; rebases at milestone boundaries.
datafusion-postgres = { git = "https://github.com/adonm/datafusion-postgres", branch = "quackgis/fixes" }

# DataFusion itself, same major as both upstreams (53). Pinned to a major to
# avoid surprises; minor moves freely.
datafusion = "53"

# Spatial engine — SedonaDB main is still on DataFusion 52 at time of writing.
# Fork adonm/sedona-db@quackgis/df53 (commit f274c942) bumps to DF 53 to align
# with datafusion-postgres master. Upstream PR candidate; see DIVERGENCE.md.
sedona = { git = "https://github.com/adonm/sedona-db.git", branch = "quackgis/df53" }

# Generic runtime / utility crates.
tokio = { version = "1.52", features = ["macros", "rt-multi-thread", "signal"] }
env_logger = "0.11"
log = "0.4"
anyhow = "1"
clap = { version = "4", features = ["derive", "env"] }

[profile.release]
strip = true
lto = "thin"
codegen-units = 1
