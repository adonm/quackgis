# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust-fast-gate:
    name: Rust fast gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install mise toolchain
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Run fast verification
        shell: bash
        run: |
          set -euo pipefail
          mise exec -- just ci
