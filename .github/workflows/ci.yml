name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # sedonadb's default feature set builds against libgeos; CI needs the headers.
  LD_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu:/usr/local/lib

jobs:
  test:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (libgeos for sedonadb-geos)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgeos-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Cache target dir
        uses: actions/cache@v4
        with:
          path: target
          key: target-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            target-${{ runner.os }}-

      - name: cargo fmt check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build (release)
        run: cargo build --workspace --release --all-targets

      - name: cargo test
        run: cargo test --workspace --all-targets

  # Standalone smoke of the wire spike (sanity check the dev path documented
  # in spike/m00-wire-spike/README.md still builds in CI).
  spike-build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgeos-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache spike target
        uses: actions/cache@v4
        with:
          path: spike/m00-wire-spike/target
          key: spike-${{ runner.os }}-${{ hashFiles('spike/m00-wire-spike/Cargo.toml') }}
          restore-keys: |
            spike-${{ runner.os }}-

      - name: Build spike (standalone, not part of workspace)
        working-directory: spike/m00-wire-spike
        run: cargo build --release
