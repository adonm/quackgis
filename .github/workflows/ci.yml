name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # ENGINE: Rust unit tests, SQL regression, catalog drift
  # ════════════════════════════════════════════════════════════════════════════
  engine:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev libgeos-dev libproj-dev libclang-dev clang
          DUCKDB_VERSION=1.5.4
          wget -q "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/duckdb_cli-linux-amd64.zip"
          unzip -o duckdb_cli-linux-amd64.zip -d duckdb_bin
          echo "$(pwd)/duckdb_bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: engine-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: engine-${{ runner.os }}-cargo-

      - name: Rust unit tests
        run: cargo test --lib
        env:
          LIBCLANG_PATH: /usr/lib/llvm-14/lib

      - name: Catalog drift gate
        run: |
          python3 tools/catalog_audit.py --check
          python3 tools/catalog_audit.py --compat-check

      - name: Build and package extension
        run: |
          cargo build --release
          ./target/release/sedonadb-package \
            target/release/libsedonadb.so \
            build/dev/sedonadb.duckdb_extension \
            linux_amd64
        env:
          LIBCLANG_PATH: /usr/lib/llvm-14/lib

      - name: SQL regression suite
        run: ./tests/run_sql.sh

      - name: Package + smoke test
        run: ./ci/package-and-smoke.sh
        env:
          LIBCLANG_PATH: /usr/lib/llvm-14/lib

  # ════════════════════════════════════════════════════════════════════════════
  # LINT: format + clippy (non-blocking)
  # ════════════════════════════════════════════════════════════════════════════
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: lint-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: lint-${{ runner.os }}-cargo-
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev libgeos-dev libproj-dev libclang-dev clang
      - run: cargo fmt --all -- --check
        continue-on-error: true
      - run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true
        env:
          LIBCLANG_PATH: /usr/lib/llvm-14/lib

  # ════════════════════════════════════════════════════════════════════════════
  # CONTAINER BUILD: build the QuackGIS facade image with layer caching
  # ════════════════════════════════════════════════════════════════════════════
  container-build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build sedonadb-builder cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: container/Dockerfile
          target: sedonadb-builder
          cache-from: type=gha,scope=sedonadb-builder
          cache-to: type=gha,mode=max,scope=sedonadb-builder
          push: false
          outputs: type=cache

      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: container/Dockerfile
          target: runtime
          tags: quackgis:ci
          cache-from: |
            type=gha,scope=sedonadb-builder
            type=gha,scope=runtime
          cache-to: type=gha,mode=max,scope=runtime
          push: false
          load: true

      - name: Save image as artifact
        run: docker save quackgis:ci | gzip > /tmp/quackgis-image.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: quackgis-image
          path: /tmp/quackgis-image.tar.gz
          retention-days: 3

  # ════════════════════════════════════════════════════════════════════════════
  # FACADE TESTS: run black-box tests against the built container
  # ════════════════════════════════════════════════════════════════════════════
  facade-tests:
    runs-on: ubuntu-22.04
    needs: container-build
    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install Python dependencies
        run: pip install psycopg[binary]

      - uses: actions/download-artifact@v4
        with:
          name: quackgis-image

      - name: Load image
        run: docker load < quackgis-image.tar.gz

      - name: Run facade test suite
        run: |
          ./container/run-all-tests.sh --no-build --skip-ducklake 2>&1 || true
        env:
          QUACKGIS_IMAGE: quackgis
          QUACKGIS_TAG: ci
          PG_PASSWORD: quackgis
          PG_PORT: 55432

      - name: Run backup test
        run: |
          # Start a container for backup testing
          docker run -d --name quackgis-backup \
            -e POSTGRES_PASSWORD=quackgis \
            -p 55433:5432 quackgis:ci
          sleep 30
          PG_HOST=127.0.0.1 PG_PORT=55433 PG_PASSWORD=quackgis \
            ./container/test-backup.sh || true
          docker rm -f quackgis-backup || true

  # ════════════════════════════════════════════════════════════════════════════
  # DOCS CHECK: markdown links and doc consistency
  # ════════════════════════════════════════════════════════════════════════════
  docs-check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Check markdown links
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re, sys
          root = Path('.')
          missing = []
          for path in list(root.glob('*.md')) + list((root/'docs').glob('*.md')):
              text = path.read_text()
              for m in re.finditer(r'\[[^\]]+\]\(([^)]+)\)', text):
                  target = m.group(1).split('#',1)[0]
                  if not target or '://' in target or target.startswith('mailto:'):
                      continue
                  p = (path.parent / target).resolve()
                  try:
                      p.relative_to(root.resolve())
                  except ValueError:
                      continue
                  if not p.exists():
                      missing.append((str(path), target))
          if missing:
              for item in missing:
                  print(f'missing link: {item[0]} -> {item[1]}')
              sys.exit(1)
          print('Markdown link check OK')
          PY
      - name: Catalog audit
        run: |
          python3 tools/catalog_audit.py --check
          python3 tools/catalog_audit.py --compat-check
