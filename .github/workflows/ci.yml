# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust-fast-gate:
    name: Rust fast gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install mise toolchain
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Bootstrap pinned DuckDB runtime
        shell: bash
        run: |
          set -euo pipefail
          mise run duckdb-bootstrap

      - name: Run required repository gate
        shell: bash
        run: |
          set -euo pipefail
          mise exec -- just ci

      - name: Run independent DuckDB probes
        shell: bash
        run: |
          set -euo pipefail
          mise exec -- just duckdb-engine-probe
          mise exec -- just duckdb-authority-probe
          mise exec -- just duckdb-spatial-compat-probe
          mise exec -- just duckdb-runtime-static-check

      - name: Upload current benchmark evidence
        uses: actions/upload-artifact@v4
        with:
          name: duckdb-current-benchmark-${{ github.sha }}
          path: .tmp/duckdb-current-benchmark/manifest.json
          if-no-files-found: error
