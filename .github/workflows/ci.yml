name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Linux amd64 — full 5-phase CI pipeline
  # ─────────────────────────────────────────────────────────────────────
  linux-amd64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev libgeos-dev libproj-dev libclang-dev clang
          # DuckDB CLI
          DUCKDB_VERSION=1.5.4
          wget -q "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/duckdb_cli-linux-amd64.zip"
          unzip -o duckdb_cli-linux-amd64.zip -d duckdb_bin
          echo "$(pwd)/duckdb_bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release
        env:
          LIBCLANG_PATH: /usr/lib/llvm-14/lib

      - name: Package
        run: |
          ./target/release/sedonadb-package \
            target/release/libsedonadb.so \
            build/dev/sedonadb.duckdb_extension \
            linux_amd64

      - name: Run full CI pipeline
        run: ./ci/all-checks.sh
        env:
          LIBCLANG_PATH: /usr/lib/llvm-14/lib

  # ─────────────────────────────────────────────────────────────────────
  # macOS — build + Rust tests + smoke (no DuckLake scale harness)
  # ─────────────────────────────────────────────────────────────────────
  macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          brew install gdal geos proj llvm duckdb

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release
        env:
          LIBCLANG_PATH: ${{ env.HOME }}/homebrew/opt/llvm/lib
          PKG_CONFIG_PATH: ${{ env.HOME }}/homebrew/lib/pkgconfig

      - name: Package
        run: |
          ./target/release/sedonadb-package \
            target/release/libsedonadb.dylib \
            build/dev/sedonadb.duckdb_extension \
            darwin_arm64

      - name: Rust unit tests
        run: cargo test --lib
        env:
          LIBCLANG_PATH: ${{ env.HOME }}/homebrew/opt/llvm/lib
          DYLD_LIBRARY_PATH: ${{ env.HOME }}/homebrew/lib

      - name: Smoke test
        run: ./ci/package-and-smoke.sh
        env:
          DYLD_LIBRARY_PATH: ${{ env.HOME }}/homebrew/lib

  # ─────────────────────────────────────────────────────────────────────
  # Rust formatting / clippy (lint, non-blocking on first run)
  # ─────────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-lint-
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev libgeos-dev libproj-dev libclang-dev clang
      - run: cargo fmt --all -- --check
        continue-on-error: true
      - run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true
        env:
          LIBCLANG_PATH: /usr/lib/llvm-14/lib
