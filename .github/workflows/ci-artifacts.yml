# SPDX-License-Identifier: Apache-2.0
name: CI artifacts

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test-package:
    name: mise check, binary, image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise toolchain
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Install Rust components
        run: mise exec -- rustup component add rustfmt clippy

      - name: Cache Cargo build outputs
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: mise exec -- cargo fmt --all -- --check

      - name: Run tests
        run: LD_LIBRARY_PATH= mise exec -- cargo test --workspace

      - name: Run clippy
        run: LD_LIBRARY_PATH= mise exec -- cargo clippy --workspace --all-targets -- -D warnings

      - name: Build release binary
        run: mise exec -- cargo build -p quackgis-server --release

      - name: Package Linux x86_64 binary
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            version="sha-${GITHUB_SHA::12}"
          fi
          archive="quackgis-server-${version}-linux-x86_64.tar.gz"
          mkdir -p dist
          tar -czf "dist/${archive}" -C target/release quackgis-server
          sha256sum "dist/${archive}" > "dist/${archive}.sha256"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: quackgis-server-${{ steps.package.outputs.version }}-linux-x86_64
          path: dist/*
          if-no-files-found: error

      - name: Compute GHCR image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Prepare runtime image context
        run: |
          mkdir -p .tmp/ci/runtime
          cp target/release/quackgis-server .tmp/ci/runtime/quackgis-server

      - name: Build and optionally push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .tmp/ci/runtime
          file: deploy/Containerfile.runtime
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64

      - name: Publish GitHub Release binaries
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
