# SPDX-License-Identifier: Apache-2.0
name: Runtime verification

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verified-runtime:
    name: verified DuckDB runtime
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install mise toolchain
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Cache Cargo build outputs
        uses: Swatinem/rust-cache@v2

      - name: Bootstrap pinned DuckDB artifacts
        run: mise run duckdb-bootstrap

      - name: Run required repository gate
        run: mise exec -- just ci

      - name: Build verified runtime context
        run: mise exec -- just duckdb-runtime-context

      - name: Validate load-only runtime contract
        run: mise exec -- just duckdb-runtime-static-check

      - name: Smoke runtime image without network
        run: CONTAINER_ENGINE=docker mise exec -- just duckdb-runtime-offline-smoke

      - name: Record source metadata
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path('.tmp/duckdb-runtime/source.json')
          path.write_text(json.dumps({
              'repository': os.environ.get('GITHUB_REPOSITORY'),
              'ref': os.environ.get('GITHUB_REF'),
              'sha': os.environ.get('GITHUB_SHA'),
              'run_id': os.environ.get('GITHUB_RUN_ID'),
          }, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY

      - name: Upload runtime verification evidence
        uses: actions/upload-artifact@v4
        with:
          name: quackgis-duckdb-runtime-evidence-${{ github.sha }}
          path: |
            .tmp/duckdb-runtime/artifact-manifest.json
            .tmp/duckdb-runtime/source.json
            .tmp/duckdb-runtime/licenses
          if-no-files-found: error
          retention-days: 14
