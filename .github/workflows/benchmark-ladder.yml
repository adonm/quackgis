# SPDX-License-Identifier: Apache-2.0
name: Benchmark ladder

"on":
  workflow_dispatch:
    inputs:
      recipe:
        description: Benchmark recipe to run
        required: true
        default: layoutbench-local-smoke
        type: choice
        options:
          - layoutbench-local-smoke
          - kind-qps-smoke
          - kind-olap-smoke
          - kind-qps-deep-smoke
          - kind-lake-layoutbench-smoke
          - kind-layoutbench-catalog-measure
      qps_deep_factor:
        description: Optional QPS_DEEP_FACTOR for kind-qps-deep-smoke
        required: false
        default: "10000"
      qps_deep_workers:
        description: Optional QPS_DEEP_WORKERS for kind-qps-deep-smoke
        required: false
        default: "32"
      qps_deep_queries:
        description: Optional QPS_DEEP_QUERIES for kind-qps-deep-smoke
        required: false
        default: "640"

permissions:
  contents: read

jobs:
  benchmark:
    name: ${{ inputs.recipe }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CONTAINER_ENGINE: docker
      KIND_EXPERIMENTAL_PROVIDER: docker
      QUACKGIS_REPORT_KIND: benchmark
      STORAGE_RECIPE: ${{ inputs.recipe }}
      QPS_DEEP_FACTOR: ${{ inputs.qps_deep_factor }}
      QPS_DEEP_WORKERS: ${{ inputs.qps_deep_workers }}
      QPS_DEEP_QUERIES: ${{ inputs.qps_deep_queries }}
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Run benchmark recipe
        shell: bash
        run: |
          set -euo pipefail
          mise exec -- just "$STORAGE_RECIPE"

      - name: Collect benchmark logs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ "$STORAGE_RECIPE" = "kind-layoutbench-catalog-measure" ]; then
            printf 'kind-layoutbench-catalog-measure writes .tmp/compatibility/metrics.json directly; skipping generic Kind report.\n'
          else
            mise exec -- just kind-compat-report || true
          fi

      - name: Render benchmark dashboard
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -f .tmp/compatibility/metrics.json ]; then
            mise exec -- just metrics-dashboard path=.tmp/compatibility out=.tmp/compatibility/metrics-dashboard.md
            cat .tmp/compatibility/metrics-dashboard.md >> "$GITHUB_STEP_SUMMARY"
          elif [ -f .tmp/compatibility/README.md ]; then
            cat .tmp/compatibility/README.md >> "$GITHUB_STEP_SUMMARY"
          else
            printf 'Benchmark recipe completed without a metrics report.\n' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report-${{ inputs.recipe }}-${{ github.sha }}-${{ github.run_id }}
          path: .tmp/compatibility
          if-no-files-found: ignore

      - name: Upload benchmark metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-metrics-${{ inputs.recipe }}-${{ github.sha }}-${{ github.run_id }}
          path: .tmp/compatibility/metrics.json
          if-no-files-found: ignore

      - name: Fail on reported benchmark failures or budget overruns
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -f .tmp/compatibility/metrics.json ]; then
            args=(--allow-not-run)
            case "$STORAGE_RECIPE" in
              kind-qps-smoke) args+=(--require-check qps_probe) ;;
              kind-olap-smoke) args+=(--require-check olap_probe) ;;
              kind-layoutbench-catalog-measure) args+=(--require-check layoutbench_catalog) ;;
            esac
            mise exec -- python3 scripts/metrics_budget_check.py "${args[@]}" .tmp/compatibility
          elif [ -f .tmp/compatibility/README.md ] && grep -q '❌ fail' .tmp/compatibility/README.md; then
            grep '^Summary:' .tmp/compatibility/README.md || true
            exit 1
          fi

      - name: Delete Kind cluster
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mise exec -- just kind-down || true
