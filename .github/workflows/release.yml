name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # BUILD: multi-arch container image
  # ════════════════════════════════════════════════════════════════════════════
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: container/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ════════════════════════════════════════════════════════════════════════════
  # SBOM: generate Software Bill of Materials
  # ════════════════════════════════════════════════════════════════════════════
  sbom:
    runs-on: ubuntu-22.04
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install syft
        run: |
          curl -sSf https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: |
          syft "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}" \
            -o spdx-json > quackgis-sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: quackgis-sbom
          path: quackgis-sbom.spdx.json

  # ════════════════════════════════════════════════════════════════════════════
  # IMAGE REPORT: size, layers, versions
  # ════════════════════════════════════════════════════════════════════════════
  image-report:
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image report
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}"
          docker pull "$IMAGE"
          {
            echo "# QuackGIS v${{ needs.build.outputs.version }} — Image Report"
            echo
            echo "**Image:** \`$IMAGE\`"
            echo "**Digest:** \`${{ needs.build.outputs.digest }}\`"
            echo "**Built:** $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Image size | $(docker images "$IMAGE" --format '{{.Size}}' | head -1) |"
            echo "| Layer count | $(docker inspect "$IMAGE" --format '{{range .RootFS.Layers}}{{println .}}{{end}}' | wc -l) |"
          } > image-report.md

      - uses: actions/upload-artifact@v4
        with:
          name: image-report
          path: image-report.md

  # ════════════════════════════════════════════════════════════════════════════
  # RELEASE: create GitHub release with notes, SBOM, and image report
  # ════════════════════════════════════════════════════════════════════════════
  release:
    runs-on: ubuntu-22.04
    needs: [build, sbom, image-report]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: quackgis-sbom

      - uses: actions/download-artifact@v4
        with:
          name: image-report

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: image-report.md
          files: |
            quackgis-sbom.spdx.json
            image-report.md
