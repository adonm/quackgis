# SPDX-License-Identifier: Apache-2.0
name: PostGIS regress subset

"on":
  schedule:
    # Weekly starter function-conformance evidence.
    - cron: "37 8 * * 2"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  postgis-regress:
    name: Curated PostGIS regress subset
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Run curated PostGIS regress subset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp/postgis-regress
          mise exec -- just postgis-regress | tee .tmp/postgis-regress/postgis-regress.log
          python3 - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          text = Path('.tmp/postgis-regress/postgis-regress.log').read_text(encoding='utf-8')
          match = re.search(r'postgis_regress_subset passed=(\d+) total=(\d+) pass_rate=([0-9.]+)', text)
          if not match:
              raise SystemExit('missing postgis_regress_subset pass-rate line')
          passed, total, pass_rate = match.groups()
          report = {
              'run': {
                  'github_repository': os.environ.get('GITHUB_REPOSITORY'),
                  'github_workflow': os.environ.get('GITHUB_WORKFLOW'),
                  'github_run_id': os.environ.get('GITHUB_RUN_ID'),
                  'github_run_attempt': os.environ.get('GITHUB_RUN_ATTEMPT'),
                  'github_sha': os.environ.get('GITHUB_SHA'),
                  'github_ref_name': os.environ.get('GITHUB_REF_NAME'),
              },
              'postgis_regress_subset': {
                  'passed': int(passed),
                  'total': int(total),
                  'pass_rate': float(pass_rate),
              },
          }
          Path('.tmp/postgis-regress/metrics.json').write_text(
              json.dumps(report, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY

      - name: Add pass-rate to job summary
        if: always()
        run: |
          if [ -f .tmp/postgis-regress/postgis-regress.log ]; then
            grep 'postgis_regress_subset' .tmp/postgis-regress/postgis-regress.log >> "$GITHUB_STEP_SUMMARY" || true
          fi

      - name: Render PostGIS trend dashboard
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -f .tmp/postgis-regress/metrics.json ]; then
            mise exec -- just metrics-dashboard path=.tmp/postgis-regress out=.tmp/postgis-regress/metrics-dashboard.md
            cat .tmp/postgis-regress/metrics-dashboard.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload PostGIS regress evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postgis-regress-${{ github.sha }}-${{ github.run_id }}
          path: .tmp/postgis-regress
          if-no-files-found: ignore
