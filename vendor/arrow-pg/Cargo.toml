[package]
name = "arrow-pg"
description = "QuackGIS Arrow-to-pgwire type mapping and encoding"
version = "0.14.0"
edition = "2024"
license = "Apache-2.0"
rust-version = "1.89"
publish = false

[features]
default = ["arrow"]
arrow = ["dep:arrow"]

[dependencies]
arrow = { version = "58", optional = true }
arrow-schema = "58"
bytes = "1"
chrono = { version = "0.4", features = ["std"] }
pg_interval = "0.5"
pgwire = { version = "0.40", default-features = false, features = ["server-api", "pg-ext-types"] }
postgres-types = "0.2"
rust_decimal = { version = "1.42", features = ["db-postgres"] }
serde_json = "1"

[dev-dependencies]
async-trait = "0.1"
half = "2.7"
proptest = "1.9"
tokio = { version = "1.52", features = ["full"]}
